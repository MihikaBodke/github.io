<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0418"/>
      <stop offset="35%" stop-color="#3b0764"/>
      <stop offset="65%" stop-color="#9333ea" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a35a"/>
      <stop offset="100%" stop-color="#92741a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="70%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunsetGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="400" height="500" rx="20" fill="url(#sky)"/>
  <rect width="400" height="500" rx="20" fill="url(#sunsetGlow)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="40"  cy="40"  r="1.2"/><circle cx="90"  cy="25"  r="0.8"/>
    <circle cx="150" cy="55"  r="1"/><circle cx="220" cy="20"  r="1.3"/>
    <circle cx="280" cy="48"  r="0.7"/><circle cx="340" cy="30"  r="1.1"/>
    <circle cx="370" cy="70"  r="0.8"/><circle cx="60"  cy="90"  r="0.9"/>
    <circle cx="130" cy="80"  r="0.7"/><circle cx="310" cy="85"  r="1"/>
    <circle cx="20"  cy="120" r="0.6"/><circle cx="380" cy="110" r="0.8"/>
  </g>

  <!-- Moon -->
  <circle cx="320" cy="70" r="22" fill="url(#moon)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="328" cy="64" r="17" fill="#3b0764" opacity="0.55"/>

  <!-- Horizon glow -->
  <ellipse cx="200" cy="310" rx="220" ry="60" fill="#ec4899" opacity="0.12" filter="url(#blur3)"/>
  <ellipse cx="200" cy="310" rx="130" ry="30" fill="#f9a8d4" opacity="0.1" filter="url(#blur3)"/>

  <!-- ── MUMBAI SKYLINE (silhouette behind Gateway) ── -->
  <g fill="#1a0030" opacity="0.85">
    <!-- Far left buildings -->
    <rect x="0"   y="210" width="28" height="100"/>
    <rect x="12"  y="190" width="18" height="120"/>
    <rect x="24"  y="220" width="30" height="90"/>
    <!-- Antenna -->
    <rect x="19"  y="170" width="4"  height="22"/>

    <!-- Left mid -->
    <rect x="48"  y="205" width="35" height="105"/>
    <rect x="58"  y="185" width="22" height="125"/>
    <rect x="78"  y="215" width="28" height="95"/>

    <!-- Right mid -->
    <rect x="295" y="200" width="30" height="110"/>
    <rect x="318" y="182" width="25" height="128"/>
    <rect x="338" y="212" width="35" height="98"/>
    <rect x="325" y="168" width="5"  height="17"/>

    <!-- Far right -->
    <rect x="368" y="195" width="32" height="115"/>
    <rect x="370" y="178" width="20" height="132"/>
  </g>

  <!-- Building windows (tiny glowing dots) -->
  <g fill="#fbbf24" opacity="0.5">
    <circle cx="16" cy="200" r="1.5"/><circle cx="22" cy="208" r="1.5"/>
    <circle cx="55" cy="215" r="1.5"/><circle cx="63" cy="210" r="1.5"/>
    <circle cx="68" cy="222" r="1.5"/><circle cx="310" cy="205" r="1.5"/>
    <circle cx="322" cy="192" r="1.5"/><circle cx="330" cy="208" r="1.5"/>
    <circle cx="345" cy="218" r="1.5"/><circle cx="378" cy="200" r="1.5"/>
    <circle cx="374" cy="210" r="1.5"/>
  </g>

  <!-- ── GATEWAY OF INDIA ── -->
  <!-- Base platform -->
  <rect x="100" y="300" width="200" height="14" rx="3" fill="url(#arch)"/>
  <rect x="108" y="296" width="184" height="8"  rx="2" fill="#d4b96a"/>

  <!-- Left tower -->
  <rect x="108" y="210" width="32" height="90" rx="2" fill="url(#arch)"/>
  <!-- Left tower dome -->
  <path d="M108,210 Q124,188 140,210 Z" fill="#c4a35a"/>
  <ellipse cx="124" cy="210" rx="16" ry="6" fill="#d4b96a"/>
  <!-- Left tower windows -->
  <rect x="114" y="240" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="128" y="240" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="114" y="262" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="128" y="262" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <!-- Turret top -->
  <ellipse cx="116" cy="207" rx="5" ry="8" fill="#c4a35a"/>
  <ellipse cx="132" cy="207" rx="5" ry="8" fill="#c4a35a"/>
  <circle cx="116" cy="200" r="4" fill="#d4b96a"/>
  <circle cx="132" cy="200" r="4" fill="#d4b96a"/>

  <!-- Right tower -->
  <rect x="260" y="210" width="32" height="90" rx="2" fill="url(#arch)"/>
  <!-- Right tower dome -->
  <path d="M260,210 Q276,188 292,210 Z" fill="#c4a35a"/>
  <ellipse cx="276" cy="210" rx="16" ry="6" fill="#d4b96a"/>
  <!-- Right tower windows -->
  <rect x="264" y="240" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="278" y="240" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="264" y="262" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <rect x="278" y="262" width="10" height="14" rx="3" fill="#0a0418" opacity="0.7"/>
  <!-- Turret top -->
  <ellipse cx="268" cy="207" rx="5" ry="8" fill="#c4a35a"/>
  <ellipse cx="284" cy="207" rx="5" ry="8" fill="#c4a35a"/>
  <circle cx="268" cy="200" r="4" fill="#d4b96a"/>
  <circle cx="284" cy="200" r="4" fill="#d4b96a"/>

  <!-- MAIN ARCH -->
  <path d="M140,300 L140,238 Q140,195 200,195 Q260,195 260,238 L260,300 Z"
        fill="url(#arch)"/>
  <!-- Arch cutout -->
  <path d="M156,300 L156,242 Q156,215 200,215 Q244,215 244,242 L244,300 Z"
        fill="#1a0030" opacity="0.9"/>
  <!-- Arch detail lines -->
  <path d="M140,240 Q200,210 260,240" fill="none" stroke="#d4b96a" stroke-width="2" opacity="0.6"/>
  <path d="M148,260 Q200,232 252,260" fill="none" stroke="#d4b96a" stroke-width="1.5" opacity="0.4"/>

  <!-- Small decorative arches on side buildings -->
  <path d="M110,252 Q124,240 138,252" fill="none" stroke="#d4b96a" stroke-width="1.5" opacity="0.6"/>
  <path d="M262,252 Q276,240 290,252" fill="none" stroke="#d4b96a" stroke-width="1.5" opacity="0.6"/>

  <!-- Central battlement top -->
  <g fill="#c4a35a">
    <rect x="180" y="192" width="8" height="10" rx="1"/>
    <rect x="192" y="190" width="10" height="12" rx="1"/>
    <rect x="206" y="190" width="10" height="12" rx="1"/>
    <rect x="220" y="192" width="8" height="10" rx="1"/>
  </g>

  <!-- Glow through arch -->
  <path d="M158,298 L158,244 Q158,217 200,217 Q242,217 242,244 L242,298 Z"
        fill="url(#glow1)" opacity="0.5"/>

  <!-- ── SEA / WATERFRONT ── -->
  <rect x="0" y="314" width="400" height="186" rx="0" fill="url(#sea)"/>

  <!-- Water ripple reflections -->
  <g fill="none" stroke="rgba(147,51,234,0.2)" stroke-width="1">
    <path d="M60,340  Q100,335 140,340  Q180,345 220,340  Q260,335 300,340  Q340,345 380,340"/>
    <path d="M40,358  Q90,352 140,358  Q190,364 240,358  Q290,352 340,358  Q370,363 400,358"/>
    <path d="M0,378   Q60,372 120,378  Q180,384 240,378  Q300,372 360,378  Q390,383 400,378"/>
  </g>
  <!-- Gateway reflection in water -->
  <path d="M140,315 L140,360 Q170,375 200,370 Q230,375 260,360 L260,315 Z"
        fill="url(#arch)" opacity="0.08"/>
  <path d="M156,315 L156,355 Q180,365 200,362 Q220,365 244,355 L244,315 Z"
        fill="#ec4899" opacity="0.05"/>

  <!-- Boats on water -->
  <g fill="rgba(147,51,234,0.4)">
    <path d="M55,360 Q70,354 85,360 L80,366 Q70,368 60,366 Z"/>
    <line x1="70" y1="354" x2="70" y2="342" stroke="rgba(236,72,153,0.5)" stroke-width="1.5"/>
    <path d="M60,343 L70,342 L70,349 Z" fill="rgba(236,72,153,0.5)"/>
  </g>
  <g fill="rgba(147,51,234,0.35)">
    <path d="M310,368 Q328,362 346,368 L342,375 Q328,377 314,375 Z"/>
    <line x1="328" y1="362" x2="328" y2="348" stroke="rgba(236,72,153,0.4)" stroke-width="1.5"/>
    <path d="M318,349 L328,348 L328,355 Z" fill="rgba(236,72,153,0.4)"/>
  </g>

  <!-- Street lamps -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="88"  y1="295" x2="88"  y2="314"/>
    <circle cx="88"  cy="292" r="3" fill="#fbbf24"/>
    <line x1="312" y1="295" x2="312" y2="314"/>
    <circle cx="312" cy="292" r="3" fill="#fbbf24"/>
  </g>

  <!-- Foreground promenade -->
  <rect x="0" y="430" width="400" height="70" rx="0" fill="#0a0215"/>
  <rect x="0" y="430" width="400" height="4" fill="rgba(147,51,234,0.2)"/>

  <!-- Walking figures silhouettes -->
  <g fill="rgba(236,72,153,0.35)">
    <ellipse cx="80"  cy="445" rx="5"  ry="9"/>
    <ellipse cx="80"  cy="456" rx="4"  ry="7"/>
    <ellipse cx="110" cy="444" rx="4.5" ry="8"/>
    <ellipse cx="110" cy="454" rx="3.5" ry="6"/>
    <ellipse cx="290" cy="445" rx="5"  ry="9"/>
    <ellipse cx="290" cy="456" rx="4"  ry="7"/>
    <ellipse cx="320" cy="443" rx="4"  ry="8"/>
    <ellipse cx="320" cy="453" rx="3.5" ry="6.5"/>
  </g>

  <!-- Text -->
  <text x="200" y="488" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" letter-spacing="4">MUMBAI</text>
</svg>
