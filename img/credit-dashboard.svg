<svg viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d0a5e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="linefill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="440" height="280" rx="16" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="rgba(147,51,234,0.07)" stroke-width="1">
    <line x1="0" y1="70" x2="440" y2="70"/>
    <line x1="0" y1="140" x2="440" y2="140"/>
    <line x1="0" y1="210" x2="440" y2="210"/>
    <line x1="110" y1="20" x2="110" y2="260"/>
    <line x1="220" y1="20" x2="220" y2="260"/>
    <line x1="330" y1="20" x2="330" y2="260"/>
  </g>

  <!-- ── TITLE ROW ── -->
  <text x="24" y="38" fill="white" font-size="13.5" font-weight="700">Credit Default Detection</text>
  <rect x="300" y="22" width="60" height="22" rx="6" fill="rgba(236,72,153,0.2)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
  <text x="330" y="37" text-anchor="middle" fill="#f9a8d4" font-size="9.5" font-weight="600">96.1% acc</text>
  <rect x="366" y="22" width="50" height="22" rx="6" fill="rgba(147,51,234,0.2)" stroke="rgba(147,51,234,0.4)" stroke-width="1"/>
  <text x="391" y="37" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="600">ML Model</text>

  <!-- ── LINE CHART (accuracy trend) ── -->
  <!-- Area fill -->
  <path d="M24,215 L24,180 L68,168 L112,155 L156,140 L200,122 L244,108 L288,94 L332,82 L376,70 L410,62 L410,215 Z"
        fill="url(#linefill)"/>
  <!-- Line -->
  <polyline points="24,180 68,168 112,155 156,140 200,122 244,108 288,94 332,82 376,70 410,62"
            fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Dots -->
  <g fill="#ec4899" filter="url(#glow)">
    <circle cx="24"  cy="180" r="3.5"/>
    <circle cx="112" cy="155" r="3.5"/>
    <circle cx="200" cy="122" r="3.5"/>
    <circle cx="288" cy="94"  r="3.5"/>
    <circle cx="410" cy="62"  r="5" fill="#f9a8d4"/>
  </g>
  <!-- Accuracy labels -->
  <text x="24"  y="196" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">85%</text>
  <text x="200" y="138" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">91%</text>
  <text x="410" y="56"  text-anchor="middle" fill="#f9a8d4" font-size="9" font-weight="700">96.1%</text>

  <!-- X axis label -->
  <text x="215" y="232" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="8.5">Model Iterations →</text>

  <!-- ── DONUT CHART (risk split) ── -->
  <!-- Background ring -->
  <circle cx="362" cy="168" r="46" fill="none" stroke="rgba(147,51,234,0.15)" stroke-width="14"/>
  <!-- Default segment ~22% (pink) -->
  <circle cx="362" cy="168" r="46" fill="none" stroke="url(#ring1)" stroke-width="14"
          stroke-dasharray="64 225" stroke-dashoffset="56" stroke-linecap="round"/>
  <!-- No-default segment ~78% (purple) -->
  <circle cx="362" cy="168" r="46" fill="none" stroke="#6d28d9" stroke-width="14"
          stroke-dasharray="220 70" stroke-dashoffset="-8" stroke-linecap="round" opacity="0.7"/>
  <!-- Center label -->
  <text x="362" y="162" text-anchor="middle" fill="white" font-size="15" font-weight="800">22%</text>
  <text x="362" y="176" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8.5">Default</text>

  <!-- Donut legend -->
  <circle cx="320" cy="222" r="4" fill="#ec4899"/>
  <text x="328" y="226" fill="rgba(255,255,255,0.6)" font-size="8.5">Default</text>
  <circle cx="358" cy="222" r="4" fill="#6d28d9"/>
  <text x="366" y="226" fill="rgba(255,255,255,0.6)" font-size="8.5">No Default</text>

  <!-- ── SHAP / FEATURE BARS (left bottom) ── -->
  <text x="24" y="250" fill="rgba(255,255,255,0.45)" font-size="8.5">Top features  ·  SHAP values</text>
  <!-- Feature importance mini bars -->
  <g>
    <text x="24"  y="268" fill="rgba(255,255,255,0.5)" font-size="7.5">Payment hist</text>
    <rect x="96"  y="258" width="72" height="8" rx="3" fill="url(#bar1)" opacity="0.9"/>

    <text x="176" y="268" fill="rgba(255,255,255,0.5)" font-size="7.5">Credit util</text>
    <rect x="234" y="258" width="52" height="8" rx="3" fill="url(#bar2)" opacity="0.85"/>

    <text x="292" y="268" fill="rgba(255,255,255,0.5)" font-size="7.5">Loan age</text>
    <rect x="340" y="258" width="36" height="8" rx="3" fill="#7c3aed" opacity="0.8"/>
  </g>
</svg>
