<svg viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d0a5e"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gbar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="gbar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gglobe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="globeClip"><circle cx="110" cy="145" r="88"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(147,51,234,0.08)" stroke-width="1">
    <line x1="0" y1="56" x2="440" y2="56"/>
    <line x1="0" y1="112" x2="440" y2="112"/>
    <line x1="0" y1="168" x2="440" y2="168"/>
    <line x1="0" y1="224" x2="440" y2="224"/>
    <line x1="88" y1="0" x2="88" y2="280"/>
    <line x1="176" y1="0" x2="176" y2="280"/>
    <line x1="264" y1="0" x2="264" y2="280"/>
    <line x1="352" y1="0" x2="352" y2="280"/>
  </g>

  <!-- ── GLOBE ── -->
  <!-- Outer glow ring -->
  <circle cx="110" cy="145" r="92" fill="none" stroke="#9333ea" stroke-width="1" opacity="0.3"/>
  <circle cx="110" cy="145" r="88" fill="url(#gglobe)" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>

  <!-- Latitude lines -->
  <g clip-path="url(#globeClip)" fill="none" stroke="rgba(147,51,234,0.25)" stroke-width="0.8">
    <ellipse cx="110" cy="145" rx="88" ry="18"/>
    <ellipse cx="110" cy="145" rx="88" ry="44"/>
    <ellipse cx="110" cy="145" rx="88" ry="70"/>
    <line x1="22" y1="145" x2="198" y2="145"/>
    <line x1="110" y1="57" x2="110" y2="233"/>
    <line x1="38" y1="88" x2="182" y2="88"/>
    <line x1="38" y1="202" x2="182" y2="202"/>
  </g>

  <!-- Continents (simplified) -->
  <g clip-path="url(#globeClip)">
    <!-- North America -->
    <path d="M55,85 L75,78 L85,88 L88,105 L80,118 L68,120 L58,112 L52,98 Z" fill="#a855f7" opacity="0.7"/>
    <!-- South America -->
    <path d="M70,128 L82,124 L88,138 L85,158 L76,168 L65,162 L60,148 L63,133 Z" fill="#9333ea" opacity="0.7"/>
    <!-- Europe -->
    <path d="M112,80 L130,76 L140,85 L138,97 L126,102 L112,96 L108,87 Z" fill="#ec4899" opacity="0.75"/>
    <!-- Africa -->
    <path d="M118,108 L138,104 L148,120 L145,148 L133,162 L118,158 L108,143 L110,120 Z" fill="#d946ef" opacity="0.65"/>
    <!-- Asia -->
    <path d="M143,75 L178,72 L195,85 L190,105 L168,115 L148,112 L138,98 L140,82 Z" fill="#8b5cf6" opacity="0.7"/>
    <!-- Australia -->
    <path d="M162,145 L182,140 L192,152 L188,168 L170,172 L158,160 L157,148 Z" fill="#c026d3" opacity="0.65"/>
  </g>

  <!-- Happiness bubbles on globe -->
  <g filter="url(#glow)">
    <circle cx="72" cy="100" r="6" fill="#ec4899" opacity="0.9"/>
    <circle cx="124" cy="87" r="8" fill="#f9a8d4" opacity="0.95"/>
    <circle cx="155" cy="88" r="5" fill="#a855f7" opacity="0.9"/>
    <circle cx="175" cy="100" r="7" fill="#ec4899" opacity="0.85"/>
    <circle cx="135" cy="125" r="5" fill="#d946ef" opacity="0.9"/>
    <circle cx="75" cy="143" r="4" fill="#9333ea" opacity="0.8"/>
    <circle cx="170" cy="150" r="6" fill="#a855f7" opacity="0.85"/>
  </g>

  <!-- ── RIGHT PANEL: CHARTS ── -->
  <!-- Title -->
  <text x="228" y="38" fill="white" font-size="13" font-weight="700" opacity="0.95">Happiness Score by Region</text>

  <!-- Bar chart -->
  <g>
    <!-- Finland -->
    <text x="228" y="72" fill="rgba(255,255,255,0.6)" font-size="9.5">Finland</text>
    <rect x="278" y="60" width="118" height="14" rx="4" fill="url(#gbar1)" opacity="0.95"/>
    <text x="401" y="72" fill="#f9a8d4" font-size="9.5" font-weight="600">7.8</text>

    <!-- Denmark -->
    <text x="228" y="98" fill="rgba(255,255,255,0.6)" font-size="9.5">Denmark</text>
    <rect x="278" y="86" width="108" height="14" rx="4" fill="url(#gbar1)" opacity="0.85"/>
    <text x="391" y="98" fill="#f9a8d4" font-size="9.5" font-weight="600">7.6</text>

    <!-- Iceland -->
    <text x="228" y="124" fill="rgba(255,255,255,0.6)" font-size="9.5">Iceland</text>
    <rect x="278" y="112" width="100" height="14" rx="4" fill="url(#gbar2)" opacity="0.85"/>
    <text x="383" y="124" fill="#c4b5fd" font-size="9.5" font-weight="600">7.5</text>

    <!-- Switzerland -->
    <text x="228" y="150" fill="rgba(255,255,255,0.6)" font-size="9.5">Switzerland</text>
    <rect x="278" y="138" width="94" height="14" rx="4" fill="url(#gbar2)" opacity="0.8"/>
    <text x="377" y="150" fill="#c4b5fd" font-size="9.5" font-weight="600">7.4</text>

    <!-- Netherlands -->
    <text x="228" y="176" fill="rgba(255,255,255,0.6)" font-size="9.5">Netherlands</text>
    <rect x="278" y="164" width="84" height="14" rx="4" fill="url(#gbar2)" opacity="0.75"/>
    <text x="367" y="176" fill="#c4b5fd" font-size="9.5" font-weight="600">7.3</text>
  </g>

  <!-- ── Stat cards at bottom ── -->
  <rect x="228" y="200" width="58" height="56" rx="10" fill="rgba(147,51,234,0.18)" stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
  <text x="257" y="225" text-anchor="middle" fill="#f9a8d4" font-size="18" font-weight="800">156</text>
  <text x="257" y="242" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8.5">Countries</text>

  <rect x="295" y="200" width="58" height="56" rx="10" fill="rgba(147,51,234,0.18)" stroke="rgba(147,51,234,0.3)" stroke-width="1"/>
  <text x="324" y="225" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="800">6.2</text>
  <text x="324" y="242" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8.5">Avg Score</text>

  <rect x="362" y="200" width="58" height="56" rx="10" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
  <text x="391" y="225" text-anchor="middle" fill="#f9a8d4" font-size="18" font-weight="800">10</text>
  <text x="391" y="242" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8.5">Indicators</text>

  <!-- Label -->
  <text x="228" y="270" fill="rgba(255,255,255,0.25)" font-size="8">World Happiness Report · Interactive Analysis</text>
</svg>
